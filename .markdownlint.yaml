# markdownlint configuration
# https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md

default: true

# MD013 - Line length
MD013:
  line_length: 250
  heading_line_length: 120
  code_block_line_length: 250
  code_blocks: false
  tables: false

# MD033 - Allow inline HTML (useful for badges, details blocks)
MD033: false

# MD041 - First line should be top-level heading.
MD041: false

# MD024 - Allow duplicate headings in different sections
MD024:
  siblings_only: true

# MD007 - Unordered list indentation
MD007:
  indent: 2

# MD029 - Ordered list item prefix
MD029:
  style: ordered
